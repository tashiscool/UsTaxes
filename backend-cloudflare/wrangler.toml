name = "ustaxes-backend"
main = "src/index.ts"
compatibility_date = "2026-03-12"

[observability]
enabled = true

[vars]
ENVIRONMENT = "development"
CORS_ORIGIN = "http://localhost:5173"
SESSION_SECRET_HMAC_KEY = "dev-secret-change-in-production"
LOCAL_DEV_AUTH_ENABLED = "true"
LOG_LEVEL = "debug"

[[d1_databases]]
binding = "USTAXES_DB"
database_name = "ustaxes-backend-local"
database_id = "0f0f5e74-7055-4f2a-8cd3-dfbf8e8cf001"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "ARTIFACTS_BUCKET"
bucket_name = "ustaxes-artifacts"
preview_bucket_name = "ustaxes-artifacts-preview"

[ai]
binding = "AI"

[[queues.producers]]
binding = "SUBMISSION_QUEUE"
queue = "ustaxes-submissions"

[[queues.consumers]]
queue = "ustaxes-submissions"
max_batch_size = 20
max_batch_timeout = 5

[[durable_objects.bindings]]
name = "SUBMISSION_ORCHESTRATOR"
class_name = "SubmissionOrchestrator"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SubmissionOrchestrator"]

# ─── Staging Environment ──────────────────────────────────────────────────────

[env.staging]
name = "ustaxes-backend-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
CORS_ORIGIN = "https://staging.freetaxflow.com"
SESSION_SECRET_HMAC_KEY = "staging-secret-change-before-real-use"
LOCAL_DEV_AUTH_ENABLED = "false"
LOG_LEVEL = "info"

[[env.staging.d1_databases]]
binding = "USTAXES_DB"
database_name = "ustaxes-backend-staging"
database_id = "8e1ebd47-8032-44b7-aeb8-f2d71c011e26"
migrations_dir = "migrations"

[[env.staging.r2_buckets]]
binding = "ARTIFACTS_BUCKET"
bucket_name = "ustaxes-artifacts-staging"

[env.staging.ai]
binding = "AI"

[[env.staging.queues.producers]]
binding = "SUBMISSION_QUEUE"
queue = "ustaxes-submissions-staging"

[[env.staging.queues.consumers]]
queue = "ustaxes-submissions-staging"
max_batch_size = 20
max_batch_timeout = 5

[[env.staging.durable_objects.bindings]]
name = "SUBMISSION_ORCHESTRATOR"
class_name = "SubmissionOrchestrator"

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["SubmissionOrchestrator"]

# ─── Production Environment ───────────────────────────────────────────────────

[env.production]
name = "ustaxes-backend"
routes = [{ pattern = "api.freetaxflow.com", custom_domain = true }]

[env.production.vars]
ENVIRONMENT = "production"
CORS_ORIGIN = "https://freetaxflow.com"
SESSION_SECRET_HMAC_KEY = "prod-secret-rotate-via-wrangler-secret"
LOCAL_DEV_AUTH_ENABLED = "false"
LOG_LEVEL = "warn"

[[env.production.d1_databases]]
binding = "USTAXES_DB"
database_name = "ustaxes-backend-production"
database_id = "2b4e1d26-d779-4f26-a8e0-3b5d23a1db2f"
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "ARTIFACTS_BUCKET"
bucket_name = "ustaxes-artifacts-production"

[env.production.ai]
binding = "AI"

[[env.production.queues.producers]]
binding = "SUBMISSION_QUEUE"
queue = "ustaxes-submissions-production"

[[env.production.queues.consumers]]
queue = "ustaxes-submissions-production"
max_batch_size = 50
max_batch_timeout = 3

[[env.production.durable_objects.bindings]]
name = "SUBMISSION_ORCHESTRATOR"
class_name = "SubmissionOrchestrator"

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["SubmissionOrchestrator"]
